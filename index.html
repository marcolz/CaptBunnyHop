<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Captain Bun Hop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    #game-wrapper {
      position: relative;
      width: min(800px, 100vw);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      touch-action: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      border-radius: 8px;
    }

    #overlay-content {
      background: rgba(255,255,255,0.92);
      border-radius: 12px;
      padding: 20px 32px;
      text-align: center;
      border: 3px solid #c8813a;
    }

    #overlay-title {
      font-size: 24px;
      font-weight: bold;
      color: #c8813a;
      letter-spacing: 2px;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    #overlay-subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    #overlay-scores {
      font-size: 13px;
      color: #333;
      margin-top: 6px;
      white-space: pre-line;
    }

    #overlay-name-row {
      margin: 10px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: auto;
    }

    #overlay-name-row label {
      font-size: 12px;
      color: #555;
    }

    #overlay-name-row input {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      padding: 4px 8px;
      border: 2px solid #c8813a;
      border-radius: 6px;
      background: #fff;
      color: #333;
      width: 180px;
      outline: none;
    }

    #overlay-name-row input:focus {
      border-color: #a5681f;
      box-shadow: 0 0 0 2px rgba(200,129,58,0.2);
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div id="overlay-content">
        <div id="overlay-title">CAPTAIN BUN HOP</div>
        <div id="overlay-subtitle">Press Space or Tap to Start</div>
        <div id="overlay-name-row" style="display:none;">
          <label for="bunny-name">Name your bunny:</label>
          <input id="bunny-name" type="text" maxlength="16" autocomplete="off">
        </div>
        <div id="overlay-scores"></div>
      </div>
    </div>
  </div>

    // ─── STATE ───────────────────────────────────────────────────────────────
    let state = 'splash'; // splash | waiting | playing | game_over
    let bunnyName = localStorage.getItem('bunnyName') || '';
    let gameOverTime = 0;
    let speed = C.INIT_SPEED;
    let frameCount = 0;

    // ─── SOUND ───────────────────────────────────────────────────────────────
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playJumpSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(580, audioCtx.currentTime + 0.07);
      osc.frequency.exponentialRampToValueAtTime(420, audioCtx.currentTime + 0.14);
      gain.gain.setValueAtTime(0.28, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.18);
    }

    function playHitSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    // ─── JINGLE ──────────────────────────────────────────────────────────────
    // G – A – B – C# – B – G (Lydian motif, ~155 BPM feel)
    const JINGLE_NOTES = [
      { freq: 392.00, t: 0.00, dur: 0.26 },   // G4
      { freq: 440.00, t: 0.32, dur: 0.26 },   // A4
      { freq: 493.88, t: 0.64, dur: 0.26 },   // B4
      { freq: 554.37, t: 0.96, dur: 0.44 },   // C#5  (longer — leading tone weight)
      { freq: 493.88, t: 1.44, dur: 0.15 },   // B4   (short pickup)
      { freq: 392.00, t: 1.62, dur: 0.46 },   // G4   (held resolution)
    ];
    const JINGLE_LOOP = 2.3; // seconds per cycle (gap after last note ~0.2s)
    let jingleActive = false;
    let jingleTimer = null;

    function _jingleNote(freq, startTime, dur, vol) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      // xylophone-ish envelope: snap attack, two-stage decay
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(vol, startTime + 0.009);
      gain.gain.exponentialRampToValueAtTime(vol * 0.6, startTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      osc.start(startTime);
      osc.stop(startTime + dur + 0.02);
    }

    function _scheduleJingleBatch(batchStart) {
      for (const n of JINGLE_NOTES) {
        _jingleNote(n.freq, batchStart + n.t, n.dur, 0.17);
      }
      // Subtle bass on the two G root notes for grounding
      _jingleNote(196.00, batchStart + 0.00, 0.30, 0.07);   // G3 under first G
      _jingleNote(196.00, batchStart + 1.62, 0.46, 0.09);   // G3 under last G
    }

    function startJingle() {
      const audio = document.getElementById("jingleAudio");
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(err => console.log("Audio play failed:", err));
    }

    function stopJingle() {
      const audio = document.getElementById("jingleAudio");
      if (!audio) return;
      audio.pause();
      audio.currentTime = 0;
    }

    // ─── BACKGROUND ──────────────────────────────────────────────────────────
    const bg = {
      cloudX: [100, 280, 500, 680],
      cloudY: [30, 55, 40, 25],
      cloudW: [80, 100, 70, 90],
      dotX: [50, 150, 250, 350, 450, 550, 650, 750],
      offset1: 0, offset2: 0,

      update(spd) {
        this.offset1 = (this.offset1 + spd * 0.25) % C.W;
        this.offset2 = (this.offset2 + spd * 0.55) % C.W;
      },

      draw(c) {
        // Sky gradient
        const sky = c.createLinearGradient(0, 0, 0, C.GROUND_Y);
        sky.addColorStop(0, '#87ceeb');
        sky.addColorStop(1, '#d4efff');
        c.fillStyle = sky;
        c.fillRect(0, 0, C.W, C.GROUND_Y);

        // Clouds (parallax layer 1 — slow)
        c.fillStyle = 'rgba(255,255,255,0.85)';
        for (let i = 0; i < this.cloudX.length; i++) {
          const cx = ((this.cloudX[i] - this.offset1 * 0.4 + C.W * 2) % (C.W + 150)) - 50;
          const cy = this.cloudY[i];
          const cw = this.cloudW[i];
          this._drawCloud(c, cx, cy, cw);
        }

        // Grass strip
        c.fillStyle = '#5aaa3c';
        c.fillRect(0, C.GROUND_Y, C.W, 8);
        c.fillStyle = '#3d8c28';
        c.fillRect(0, C.GROUND_Y + 8, C.W, 4);

        // Ground fill
        c.fillStyle = '#c8a86a';
        c.fillRect(0, C.GROUND_Y + 12, C.W, C.H - C.GROUND_Y - 12);

        // Ground dots / pebbles (parallax layer 2 — faster)
        c.fillStyle = '#a8885a';
        for (let i = 0; i < this.dotX.length; i++) {
          const dx = ((this.dotX[i] - this.offset2 + C.W * 2) % (C.W + 20)) - 10;
          c.beginPath();
          c.ellipse(dx, C.GROUND_Y + 18, 4, 2.5, 0, 0, Math.PI * 2);
          c.fill();
          c.beginPath();
          c.ellipse(dx + 100, C.GROUND_Y + 24, 3, 2, 0, 0, Math.PI * 2);
          c.fill();
        }
      },

      _drawCloud(c, x, y, w) {
        const h = w * 0.4;
        c.beginPath();
        c.ellipse(x, y, w * 0.5, h * 0.6, 0, 0, Math.PI * 2);
        c.ellipse(x + w * 0.25, y - h * 0.3, w * 0.35, h * 0.55, 0, 0, Math.PI * 2);
        c.ellipse(x - w * 0.2, y - h * 0.1, w * 0.3, h * 0.45, 0, 0, Math.PI * 2);
        c.fill();
      }
    };

    // ─── BUNNY ───────────────────────────────────────────────────────────────
    class Bunny {
      constructor() { this.reset(); }

      reset() {
        this.x = 110;
        this.y = C.GROUND_Y - C.BUNNY_H;
        this.vy = 0;
        this.onGround = true;
        this.hopFrame = 0;
        this.hopTimer = 0;
        this.squish = 1; // y scale on landing
        this.squishTimer = 0;
        this.isSquat = false;
      }

      jump() {
        if (!this.onGround) return;
        this.vy = C.JUMP_VEL;
        this.onGround = false;
        this.squish = 0.7;
        this.squishTimer = 8;
        playJumpSound();
      }

      releaseJump() {
        if (!this.onGround && this.vy < C.JUMP_CUTOFF_VEL) {
          this.vy = C.JUMP_CUTOFF_VEL;
        }
      }

      squat() {
        if (this.onGround) this.isSquat = true;
      }

      releaseSquat() {
        this.isSquat = false;
      }

      update() {
        if (!this.onGround) {
          this.vy += C.GRAVITY;
          this.y += this.vy;
          if (this.y >= C.GROUND_Y - C.BUNNY_H) {
            this.y = C.GROUND_Y - C.BUNNY_H;
            this.vy = 0;
            this.onGround = true;
            this.squish = 1.35;
            this.squishTimer = 8;
          }
        }
        if (this.squishTimer > 0) {
          this.squishTimer--;
          this.squish += (1 - this.squish) * 0.35;
        } else {
          this.squish = 1;
        }
        if (this.onGround && state === 'playing') {
          this.hopTimer++;
          if (this.hopTimer >= 8) { this.hopTimer = 0; this.hopFrame = (this.hopFrame + 1) % 4; }
        }
      }

      getBounds() {
        const h = this.isSquat ? 16 : C.BUNNY_H - 6;
        const yOffset = this.isSquat ? (C.BUNNY_H - 6 - h) : 4;
        return { x: this.x + 5, y: this.y + yOffset, w: C.BUNNY_W - 10, h };
      }

      draw(c) {
        c.save();
        const cx = this.x + C.BUNNY_W / 2;
        const cy = this.y + C.BUNNY_H;
        c.translate(cx, cy);
        const yScale = this.isSquat ? this.squish * 0.55 : this.squish;
        c.scale(1, yScale);
        c.translate(-cx, -cy);

        const bx = this.x;
        const by = this.y;
        const hop = this.hopFrame;

        // Shadow
        c.fillStyle = 'rgba(0,0,0,0.12)';
        c.beginPath();
        c.ellipse(bx + C.BUNNY_W / 2, C.GROUND_Y + 2, 14, 4, 0, 0, Math.PI * 2);
        c.fill();

        // Tail
        c.fillStyle = '#f0f0f0';
        c.beginPath();
        c.arc(bx + 4, by + C.BUNNY_H - 10, 6, 0, Math.PI * 2);
        c.fill();

        // Body
        c.fillStyle = '#f5f0e8';
        c.beginPath();
        c.ellipse(bx + C.BUNNY_W / 2, by + C.BUNNY_H - 14, 14, 16, 0, 0, Math.PI * 2);
        c.fill();

        // Belly
        c.fillStyle = '#ffe8e0';
        c.beginPath();
        c.ellipse(bx + C.BUNNY_W / 2 + 2, by + C.BUNNY_H - 12, 8, 10, 0.1, 0, Math.PI * 2);
        c.fill();

        // Ears
        const earWobble = this.onGround ? Math.sin(hop * Math.PI / 2) * 2 : -3;
        // Left ear
        c.fillStyle = '#f5f0e8';
        c.beginPath();
        c.ellipse(bx + 10, by + 10 + earWobble, 5, 14, -0.15, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#f0a0b0';
        c.beginPath();
        c.ellipse(bx + 10, by + 11 + earWobble, 2.5, 10, -0.15, 0, Math.PI * 2);
        c.fill();
        // Right ear
        c.fillStyle = '#f5f0e8';
        c.beginPath();
        c.ellipse(bx + 22, by + 10 + earWobble, 5, 14, 0.15, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#f0a0b0';
        c.beginPath();
        c.ellipse(bx + 22, by + 11 + earWobble, 2.5, 10, 0.15, 0, Math.PI * 2);
        c.fill();

        // Head
        c.fillStyle = '#f5f0e8';
        c.beginPath();
        c.arc(bx + C.BUNNY_W / 2 + 2, by + 24, 12, 0, Math.PI * 2);
        c.fill();

        // Eyes
        c.fillStyle = '#2a1a1a';
        c.beginPath();
        c.arc(bx + 12, by + 22, 2.2, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.arc(bx + 22, by + 22, 2.2, 0, Math.PI * 2);
        c.fill();
        // Eye shine
        c.fillStyle = 'white';
        c.beginPath();
        c.arc(bx + 13, by + 21, 0.8, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.arc(bx + 23, by + 21, 0.8, 0, Math.PI * 2);
        c.fill();

        // Nose
        c.fillStyle = '#f0a0b0';
        c.beginPath();
        c.ellipse(bx + 17, by + 26, 2.5, 1.8, 0, 0, Math.PI * 2);
        c.fill();

        // Mouth
        c.strokeStyle = '#c07080';
        c.lineWidth = 1.2;
        c.beginPath();
        c.moveTo(bx + 17, by + 27.5);
        c.quadraticCurveTo(bx + 14, by + 30, bx + 13, by + 29);
        c.stroke();
        c.beginPath();
        c.moveTo(bx + 17, by + 27.5);
        c.quadraticCurveTo(bx + 20, by + 30, bx + 21, by + 29);
        c.stroke();

        // Legs — hop animation
        const legOffset = this.onGround ? [0, 4, 0, -4][hop] : 0;
        c.fillStyle = '#f5f0e8';
        // Back legs
        c.beginPath();
        c.ellipse(bx + 8, by + C.BUNNY_H - 4 + legOffset, 7, 5, this.onGround ? 0.3 : -0.5, 0, Math.PI * 2);
        c.fill();
        // Front legs
        c.beginPath();
        c.ellipse(bx + 22, by + C.BUNNY_H - 4 - legOffset, 6, 4.5, -0.3, 0, Math.PI * 2);
        c.fill();

        c.restore();
      }
    }

    // ─── OBSTACLE ────────────────────────────────────────────────────────────
    class Obstacle {
      constructor(type, spawnSpeed) {
        this.type = type;
        this.speed = spawnSpeed;
        if (type === 'house') {
          this.isMultiStory = Math.random() < 0.35;
          this.w = 48;
          this.h = this.isMultiStory ? 85 : 58;
          this.x = C.W + 10;
          this.y = C.GROUND_Y - this.h;
          this.garageH = this.isMultiStory ? 40 : 0;
        } else {
          // aspect ratio of booty.png is ~1340:793 ≈ 1.69:1
          this.w = 90; this.h = 53;
          this.x = C.W + 10;
          this.y = C.GROUND_Y - 100 - Math.random() * 30;
        }
      }

      update(spd) { this.x -= spd; }

      isOffscreen() { return this.x + this.w < 0; }

      getBounds() {
        if (this.type === 'snack') {
          // collision on bag body only, not the wings (outer ~28% each side)
          return { x: this.x + this.w * 0.28, y: this.y + this.h * 0.08, w: this.w * 0.44, h: this.h * 0.84 };
        }
        const m = 4;
        return { x: this.x + m, y: this.y + m, w: this.w - m * 2, h: this.h - m * 2 };
      }

      draw(c) {
        if (this.type === 'house') this._drawHouse(c);
        else this._drawSnack(c);
      }

      _drawHouse(c) {
        const x = this.x, y = this.y, w = this.w, h = this.h;

        if (this.isMultiStory) {
          // Two-story house with garage
          const topH = h - this.garageH;

          // Top floor (normal house)
          c.fillStyle = '#c8813a';
          c.fillRect(x, y + 20, w, topH - 20);
          c.fillStyle = '#a86828';
          c.fillRect(x + w - 10, y + 20, 10, topH - 20);

          // Roof for top floor
          c.fillStyle = '#8b4513';
          c.beginPath();
          c.moveTo(x - 4, y + 22);
          c.lineTo(x + w / 2, y);
          c.lineTo(x + w + 4, y + 22);
          c.closePath();
          c.fill();
          c.fillStyle = '#6b3010';
          c.fillRect(x + w / 2 - 2, y, 4, 22);

          // Window on top floor
          c.fillStyle = '#a0d4f0';
          c.fillRect(x + 6, y + 28, 12, 10);
          c.strokeStyle = '#5a3010';
          c.lineWidth = 1.5;
          c.strokeRect(x + 6, y + 28, 12, 10);
          c.beginPath();
          c.moveTo(x + 12, y + 28); c.lineTo(x + 12, y + 38);
          c.moveTo(x + 6, y + 33); c.lineTo(x + 18, y + 33);
          c.stroke();

          // Bottom floor (garage)
          const gY = y + topH;
          // Left pillar
          c.fillStyle = '#8b4513';
          c.fillRect(x, gY, 6, this.garageH);
          // Right pillar
          c.fillRect(x + w - 6, gY, 6, this.garageH);
          // Top beam
          c.fillRect(x, gY, w, 3);

          // Cardboard texture
          c.strokeStyle = 'rgba(80,40,10,0.3)';
          c.lineWidth = 0.8;
          for (let i = 0; i < 2; i++) {
            c.beginPath();
            c.moveTo(x + 2, y + 30 + i * 10);
            c.lineTo(x + w - 6, y + 30 + i * 10);
            c.stroke();
          }
          c.fillStyle = 'rgba(80,40,10,0.35)';
          c.font = 'bold 5px monospace';
          c.fillText('2-STORY', x + 2, y + 26);
        } else {
          // Single-story house
          c.fillStyle = '#c8813a';
          c.fillRect(x, y + 20, w, h - 20);
          c.fillStyle = '#a86828';
          c.fillRect(x + w - 10, y + 20, 10, h - 20);

          c.fillStyle = '#8b4513';
          c.beginPath();
          c.moveTo(x - 4, y + 22);
          c.lineTo(x + w / 2, y);
          c.lineTo(x + w + 4, y + 22);
          c.closePath();
          c.fill();
          c.fillStyle = '#6b3010';
          c.fillRect(x + w / 2 - 2, y, 4, 22);

          c.fillStyle = '#5a3010';
          c.fillRect(x + w / 2 - 7, y + h - 22, 14, 22);
          c.fillStyle = '#3a1a08';
          c.fillRect(x + w / 2 - 6, y + h - 21, 12, 20);
          c.fillStyle = '#f0c040';
          c.beginPath();
          c.arc(x + w / 2 + 3, y + h - 11, 1.5, 0, Math.PI * 2);
          c.fill();

          c.fillStyle = '#a0d4f0';
          c.fillRect(x + 6, y + 28, 12, 10);
          c.strokeStyle = '#5a3010';
          c.lineWidth = 1.5;
          c.strokeRect(x + 6, y + 28, 12, 10);
          c.beginPath();
          c.moveTo(x + 12, y + 28); c.lineTo(x + 12, y + 38);
          c.moveTo(x + 6, y + 33); c.lineTo(x + 18, y + 33);
          c.stroke();

          c.strokeStyle = 'rgba(80,40,10,0.3)';
          c.lineWidth = 0.8;
          for (let i = 0; i < 3; i++) {
            c.beginPath();
            c.moveTo(x + 2, y + 30 + i * 10);
            c.lineTo(x + w - 12, y + 30 + i * 10);
            c.stroke();
          }
          c.fillStyle = 'rgba(80,40,10,0.35)';
          c.font = 'bold 6px monospace';
          c.fillText('CARDBOARD', x + 2, y + 26);
        }
      }

      _drawSnack(c) {
        const t = Date.now();
        const bob = Math.sin(t / 220) * 3;
        const tilt = Math.sin(t / 340) * 0.06;
        const cx = this.x + this.w / 2;
        const cy = this.y + this.h / 2 + bob;
        c.save();
        c.translate(cx, cy);
        c.rotate(tilt);
        if (bootyImg.complete && bootyImg.naturalWidth) {
          c.drawImage(bootyImg, -this.w / 2, -this.h / 2, this.w, this.h);
        } else {
          // fallback while image loads
          c.fillStyle = '#ff8c1a';
          c.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        }
        c.restore();
      }
    }

    // ─── OBSTACLE MANAGER ────────────────────────────────────────────────────
    const obstacles = {
      list: [],
      distToNext: 900,

      reset() {
        this.list = [];
        this.distToNext = 900 + Math.random() * 400;
      },

      update(spd) {
        this.distToNext -= spd;
        if (this.distToNext <= 0) {
          const type = Math.random() < 0.55 ? 'house' : 'snack';
          this.list.push(new Obstacle(type, spd));
          const gap = C.OBS_MIN_GAP + Math.random() * (C.OBS_MAX_GAP - C.OBS_MIN_GAP);
          this.distToNext = gap / (spd / C.INIT_SPEED);
        }
        for (const o of this.list) o.update(spd);
        this.list = this.list.filter(o => !o.isOffscreen());
      },

      checkCollision(b, bunny) {
        for (const o of this.list) {
          let ob = o.getBounds();
          if (o.type === 'house' && o.isMultiStory && bunny && bunny.isSquat) {
            const m = 4;
            ob = { x: o.x + m, y: o.y + m, w: o.w - m * 2, h: o.h - o.garageH - m };
          }
          if (b.x < ob.x + ob.w && b.x + b.w > ob.x &&
              b.y < ob.y + ob.h && b.y + b.h > ob.y) return true;
        }
        return false;
      },

      draw(c) {
        for (const o of this.list) o.draw(c);
      }
    };

    // ─── SCORE ───────────────────────────────────────────────────────────────
    const score = {
      current: 0,
      high: parseInt(localStorage.getItem('dodge_hi') || '0', 10),
      flashTimer: 0,

      reset() { this.current = 0; this.flashTimer = 0; },

      increment() {
        this.current++;
        if (this.current % 100 === 0) this.flashTimer = 20;
      },

      checkHigh() {
        if (this.current > this.high) {
          this.high = this.current;
          localStorage.setItem('dodge_hi', this.high);
        }
      },

      draw(c) {
        if (this.flashTimer > 0) { this.flashTimer--; }
        const flash = this.flashTimer > 0 && Math.floor(this.flashTimer / 4) % 2 === 0;
        c.font = 'bold 15px "Courier New", monospace';
        c.textAlign = 'right';
        c.fillStyle = flash ? '#ff8c00' : 'rgba(0,0,0,0.55)';
        c.fillText(
          `HI ${String(this.high).padStart(5,'0')}  ${String(this.current).padStart(5,'0')}`,
          C.W - 10, 24
        );
        c.textAlign = 'left';
      }
    };

    // ─── ENTITIES ────────────────────────────────────────────────────────────
    const bunny = new Bunny();

    // ─── OVERLAY ─────────────────────────────────────────────────────────────
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-subtitle');
    const overlayScores = document.getElementById('overlay-scores');
    const overlayNameRow = document.getElementById('overlay-name-row');
    const bunnyNameInput = document.getElementById('bunny-name');

    function getRandomQuote() {
      return STARTUP_QUOTES[Math.floor(Math.random() * STARTUP_QUOTES.length)];
    }

    function showOverlay(mode) {
      overlay.style.display = 'flex';
      if (mode === 'splash') {
        overlayTitle.textContent = 'CAPTAIN BUN HOP';
        overlaySub.style.display = '';
        overlaySub.textContent = getRandomQuote();
        overlayNameRow.style.display = 'none';
        overlayScores.textContent = 'Tap or press any key to begin';
      } else if (mode === 'waiting') {
        startJingle();
        overlayTitle.textContent = 'WELCOME';
        overlaySub.style.display = 'none';
        overlayNameRow.style.display = 'flex';
        bunnyNameInput.value = bunnyName;
        overlayScores.textContent = (score.high > 0 ? `Best: ${score.high} • ` : '') + 'Press Space or Tap to Start';
      } else {
        startJingle();
        overlayTitle.textContent = 'GAME OVER';
        overlaySub.style.display = '';
        overlaySub.textContent = bunnyName
          ? `${bunnyName} scored ${score.current}!`
          : `Your bunny scored ${score.current}!`;
        overlayNameRow.style.display = 'none';
        overlayScores.textContent = `Best: ${score.high}${score.current === score.high && score.high > 0 ? ' 🏆 New Record!' : ''}`;
        overlayScores.textContent += '\nPress Space or Tap to Restart';
      }
    }

    function hideOverlay() { overlay.style.display = 'none'; }

    // ─── GAME CONTROL ────────────────────────────────────────────────────────
    function startGame() {
      initAudio();
      stopJingle();
      bunnyName = (bunnyNameInput.value || '').trim().slice(0, 16);
      localStorage.setItem('bunnyName', bunnyName);
      if (document.activeElement === bunnyNameInput) bunnyNameInput.blur();
      state = 'playing';
      speed = C.INIT_SPEED;
      frameCount = 0;
      score.reset();
      bunny.reset();
      obstacles.reset();
      hideOverlay();
    }

    function gameOver() {
      state = 'game_over';
      gameOverTime = performance.now();
      score.checkHigh();
      playHitSound();
      showOverlay('game_over');
    }

    function goToWelcome() {
      stopJingle();
      state = 'waiting';
      speed = C.INIT_SPEED;
      score.reset();
      bunny.reset();
      obstacles.reset();
      showOverlay('waiting');
    }

    // ─── INPUT ───────────────────────────────────────────────────────────────
    function handleInput() {
      initAudio();
      if (state === 'splash') {
        state = 'waiting';
        showOverlay('waiting');
        setTimeout(() => bunnyNameInput.focus(), 0);
      } else if (state === 'waiting' || (state === 'game_over' && performance.now() - gameOverTime >= 3000)) {
        startGame();
      } else if (state === 'playing') {
        bunny.jump();
      }
    }

    function handleRelease() {
      if (state === 'playing') bunny.releaseJump();
    }

    document.addEventListener('keydown', e => {
      const inInput = e.target === bunnyNameInput;
      if (inInput) {
        if (e.code === 'Enter') {
          e.preventDefault();
          handleInput();
        } else if (e.code === 'Escape') {
          e.preventDefault();
          goToWelcome();
        }
        return;
      }
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') {
        e.preventDefault();
        if (e.repeat) return;
        handleInput();
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        if (state === 'playing') bunny.squat();
      } else if (e.code === 'Escape') {
        e.preventDefault();
        goToWelcome();
      }
    });

    document.addEventListener('keyup', e => {
      if (e.target === bunnyNameInput) return;
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        handleRelease();
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        if (state === 'playing') bunny.releaseSquat();
      }
    });

    document.addEventListener('touchstart', e => {
      if (e.target === bunnyNameInput) return;
      e.preventDefault();
      handleInput();
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.target === bunnyNameInput) return;
      e.preventDefault();
      handleRelease();
    }, { passive: false });

    canvas.addEventListener('mousedown', () => handleInput());
    canvas.addEventListener('mouseup', () => handleRelease());

    // ─── GAME LOOP ────────────────────────────────────────────────────────────
    let lastTs = 0;
    function loop(ts) {
      requestAnimationFrame(loop);
      const dt = ts - lastTs;
      lastTs = ts;
      if (dt > 100) return; // tab was backgrounded

      if (state === 'playing') {
        frameCount++;
        speed = Math.min(C.MAX_SPEED, speed + C.SPEED_INC);
        score.increment();
        bg.update(speed);
        bunny.update();
        obstacles.update(speed);
        if (obstacles.checkCollision(bunny.getBounds(), bunny)) gameOver();
      } else if (state === 'waiting') {
        bg.update(1.5);
        bunny.update();
      } else if (state === 'game_over') {
        // static — nothing updates
      }

      // Render
      ctx.clearRect(0, 0, C.W, C.H);
      bg.draw(ctx);
      obstacles.draw(ctx);
      bunny.draw(ctx);
      score.draw(ctx);
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    showOverlay('splash');
    requestAnimationFrame(loop);

  })();

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Captain Bun Hop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    #game-wrapper {
      position: relative;
      width: min(800px, 100vw);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      touch-action: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      border-radius: 8px;
    }

    #overlay-whats-new {
      background: rgba(255,255,255,0.92);
      border: 3px solid #c8813a;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12px;
      color: #333;
      text-align: center;
      max-width: 80%;
    }
    #overlay-whats-new .wn-label {
      color: #c8813a;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #overlay-content {
      background: rgba(255,255,255,0.92);
      border-radius: 12px;
      padding: 20px 32px;
      text-align: center;
      border: 3px solid #c8813a;
    }

    #overlay-title {
      font-size: 24px;
      font-weight: bold;
      color: #c8813a;
      letter-spacing: 2px;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    #overlay-subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    #overlay-leaderboard {
      margin: 8px 0 2px;
      font: 11px "Courier New", monospace;
      color: #444;
      min-width: 200px;
    }
    #overlay-leaderboard table { width: 100%; border-collapse: collapse; }
    #overlay-leaderboard td { padding: 1px 4px; }
    #overlay-leaderboard .lb-rank { color: #aaa; width: 22px; }
    #overlay-leaderboard .lb-name { max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #overlay-leaderboard .lb-score { text-align: right; font-weight: bold; padding-left: 12px; }
    #overlay-leaderboard tr.lb-current td { color: #c8813a; }

    #overlay-scores {
      font-size: 13px;
      color: #333;
      margin-top: 6px;
      white-space: pre-line;
    }

    #overlay-name-row {
      margin: 10px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: auto;
    }

    #overlay-name-row label {
      font-size: 12px;
      color: #555;
    }

    #overlay-name-row input {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      padding: 4px 8px;
      border: 2px solid #c8813a;
      border-radius: 6px;
      background: #fff;
      color: #333;
      width: 180px;
      outline: none;
    }

    #overlay-name-row input:focus {
      border-color: #a5681f;
      box-shadow: 0 0 0 2px rgba(200,129,58,0.2);
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div id="overlay-whats-new">
        <span class="wn-label">WHAT'S NEW:</span> Cheese puffs are smaller and now sway &mdash; watch out for the rare GIANT one!
       </div>
      <div id="overlay-content">
        <div id="overlay-title">CAPTAIN BUN HOP</div>
        <div id="overlay-subtitle">Press Space or Tap to Start</div>
        <div id="overlay-name-row" style="display:none;">
          <label for="bunny-name">Name your bunny:</label>
          <input id="bunny-name" type="text" maxlength="16" autocomplete="off">
        </div>
        <div id="overlay-leaderboard"></div>
        <div id="overlay-scores"></div>
      </div>
    </div>
  </div>
  <audio id="jingleAudio" preload="auto"></audio>
  <audio id="gameOverAudio" preload="auto"></audio>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
